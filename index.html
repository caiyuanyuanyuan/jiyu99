<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我是星星妹</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #FFB6C1; /* 极禹专属少女粉背景 */
    font-family: "Microsoft YaHei", sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  
  /* ================= 页面大框架 ================= */
  .top-section {
    height: 50vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    padding: 0 40px;
    z-index: 5;
  }
  
  .content-box {
    width: 100%;
    max-width: 800px;
    height: 90%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  
  /* ================= 极禹动物塑（超大 Emoji 互动双向亲亲） ================= */
  .animal-box {
    font-size: 130px;
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: transform 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  /* 主动去中间深度贴贴的动画类 */
  .pig-to-center {
    animation: pigCenterKiss 1.2s ease-in-out forwards;
  }
  .dog-to-center {
    animation: dogCenterKiss 1.2s ease-in-out forwards;
  }

  @keyframes pigCenterKiss {
    0% { transform: translateX(0) scale(1); }
    40% { transform: translateX(calc(50vw - 180px)) scale(1.3) rotate(15deg); }
    70% { transform: translateX(calc(50vw - 200px)) scale(1.4) rotate(25deg); }
    100% { transform: translateX(calc(50vw - 210px)) scale(1.3) rotate(15deg); }
  }

  @keyframes dogCenterKiss {
    0% { transform: translateX(0) scale(1); }
    40% { transform: translateX(calc(-50vw + 180px)) scale(1.3) rotate(-15deg); }
    70% { transform: translateX(calc(-50vw + 200px)) scale(1.4) rotate(-25deg); }
    100% { transform: translateX(calc(-50vw + 210px)) scale(1.3) rotate(-15deg); }
  }
  
  /* 原有的小猪主动亲 */
  #pigActor.kiss-action {
    animation: pigKiss 0.5s ease-in-out;
  }
  @keyframes pigKiss {
    0% { transform: scale(1) translateX(0) rotate(0deg); }
    30% { transform: scale(1.1) translateX(-30px) rotate(-15deg); }
    65% { transform: scale(1.3) translateX(260px) translateY(-20px) rotate(15deg); }
    100% { transform: scale(1) translateX(0) rotate(0deg); }
  }

  /* 原有的小狗主动亲 */
  #dogTarget.kiss-back-action {
    animation: dogKissBack 0.5s ease-in-out;
  }
  @keyframes dogKissBack {
    0% { transform: scale(1) translateX(0) rotate(0deg); }
    30% { transform: scale(1.1) translateX(30px) rotate(15deg); }
    65% { transform: scale(1.3) translateX(-260px) translateY(-20px) rotate(-15deg); }
    100% { transform: scale(1) translateX(0) rotate(0deg); }
  }

  /* 被亲害羞转圈 */
  .animal-box.shy-action {
    animation: animalShy 0.6s ease-in-out;
  }
  @keyframes animalShy {
    0% { transform: scale(1) rotate(0deg); }
    30% { transform: scale(1.3) rotate(180deg); }
    60% { transform: scale(1.2) rotate(360deg); filter: drop-shadow(0 0 20px #FF1493); }
    100% { transform: scale(1) rotate(360deg); }
  }

  /* ================= 中间旋转文字（我是星星妹呀） ================= */
  .circle-text-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
  }
  
  .center-emoji {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 110px;
    z-index: 2;
    color: #FF1493;
    filter: drop-shadow(0 0 12px #FFF) drop-shadow(0 0 25px #FF69B4) drop-shadow(0 6px 12px rgba(0,0,0,0.35));
    animation: pinkStarBounce 1.2s ease-in-out infinite;
  }
  @keyframes pinkStarBounce {
    0%, 100% { transform: translate(-50%, -50%) scale(1); text-shadow: 0 0 10px #FFF; }
    50% { transform: translate(-50%, -50%) scale(1.18); text-shadow: 0 0 25px #FF1493, 0 0 40px #FFF; }
  }
  
  .rotate-ring {
    width: 100%;
    height: 100%;
    position: relative;
    animation: spin 6s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  
  .rotate-text {
    position: absolute;
    font-size: 72px; 
    font-weight: 900;
    left: 50%;
    top: 50%;
    transform-origin: center center;
    text-shadow: 3px 3px 0px #000;
  }
  .text-1 { color: #FF7F00; transform: translate(-50%, -170px); }
  .text-2 { color: #00FF00; transform: translate(110px, -110px); }
  .text-3 { color: #FF7F00; transform: translate(110px, 40px); }
  .text-4 { color: #00FF00; transform: translate(-50%, 100px); }
  .text-5 { color: #FF7F00; transform: translate(-200px, 40px); }
  .text-6 { color: #00FF00; transform: translate(-200px, -110px); }
  
  /* ================= 中部极禹名场面文本区 ================= */
  .middle-section {
    height: 28vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
    position: relative;
    z-index: 5;
  }

  .hometown-text {
    font-size: 42px;
    font-weight: 900;
    text-align: center;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #FF7F00, #fff, #00FF00, #fff, #FF7F00);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glowStream 3s linear infinite;
    filter: drop-shadow(0px 2px 5px rgba(0, 0, 0, 0.4));
    margin-bottom: 5px;
    z-index: 5;
  }
  @keyframes glowStream {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .fan-text, .fan-code {
    font-size: 28px; 
    font-weight: bold;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    animation: jiyuColor 2.5s ease-in-out infinite;
    z-index: 5;
  }
  .fan-code {
    font-size: 24px;
    animation: jiyuColor 2.5s ease-in-out infinite reverse;
  }
  @keyframes jiyuColor {
    0% { color: #FF7F00; transform: scale(1); }
    50% { color: #00FF00; transform: scale(1.05); }
    100% { color: #FF7F00; transform: scale(1); }
  }

  .danmaku-container {
    position: absolute;
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.35;
    font-size: 24px;
    font-weight: bold;
  }
  .danmaku-top { top: -10px; }
  .danmaku-bottom { bottom: -10px; }
  
  .danmaku-track {
    display: inline-block;
    animation: marquee 12s linear infinite;
  }
  .danmaku-track.reverse {
    animation: marqueeReverse 12s linear infinite;
  }
  .danmaku-track span:nth-child(odd) { color: #FF7F00; text-shadow: 1px 1px 1px #000; }
  .danmaku-track span:nth-child(even) { color: #00FF00; text-shadow: 1px 1px 1px #000; }

  @keyframes marquee {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-50%, 0, 0); }
  }
  @keyframes marqueeReverse {
    0% { transform: translate3d(-50%, 0, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }
  
  /* ================= 底部互动区 ================= */
  .bottom-section {
    height: 22vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    z-index: 5;
  }
  .question {
    font-size: 42px;
    font-weight: bold;
    color: #fff;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
  }
  .btn-group {
    display: flex;
    gap: 80px;
  }
  .btn {
    padding: 15px 45px;
    font-size: 28px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    background: #fff;
    color: #FF1493;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }
  .btn:hover {
    transform: scale(1.15);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }
  
  /* 喜欢弹窗 */
  .thank-you {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 90px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 15px #FF7F00, 0 0 25px #FF00FF, 0 0 40px #00FF00;
    z-index: 100;
    pointer-events: none;
    transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    text-align: center;
    width: 100%;
  }
  .thank-you.show {
    transform: translate(-50%, -50%) scale(1);
    animation: wiggle 1s ease-in-out infinite 0.5s;
  }
  @keyframes wiggle {
    0%, 100% { transform: translate(-50%, -50%) rotate(-5deg) scale(1); }
    50% { transform: translate(-50%, -50%) rotate(5deg) scale(1.05); }
  }

  /* 散射爱心与钻石粒子 */
  .burst-heart {
    position: absolute;
    font-size: 45px;
    pointer-events: none;
    animation: heartFloat 0.8s ease-out forwards;
    z-index: 100;
  }
  @keyframes heartFloat {
    0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(1.6); opacity: 0; }
  }

  /* ================= ☁️ 真正 ☁️ Emoji 完美正中心云朵气泡 ================= */
  .cloud-bubble {
    position: absolute;
    width: 150px;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: auto;
    cursor: pointer;
    user-select: none;
    z-index: 2;
    animation: floatBubble var(--duration) linear forwards;
  }
  
  /* ☁️ 云朵 Emoji 背景层 */
  .cloud-bg {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%); /* 绝对居中于容器 */
    font-size: 165px; /* 超大纯白云朵 */
    line-height: 1;
    color: #FFFFFF; /* 保证原生Emoji在支持的机型上滤出纯白偏好 */
    opacity: 0.95;
    /* 柔和云朵倒影阴影 */
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.12)); 
    z-index: 1;
    pointer-events: none;
    white-space: nowrap;
  }

  /* 舞台文字层：强制固定在云朵真正的物理中心点 */
  .bubble-content {
    position: absolute;
    left: 50%;
    top: 45%; /* 物理视觉修正微调，完美正中心 */
    transform: translate(-50%, -50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 120px; /* 锁死最大宽度防穿帮 */
  }

  .bubble-time {
    font-size: 11px;
    color: #FF4500;
    font-weight: 900;
    background: rgba(255, 255, 255, 0.85);
    padding: 1px 5px;
    border-radius: 8px;
    margin-bottom: 3px;
    white-space: nowrap;
  }

  .bubble-title {
    font-size: 14px;
    color: #222222;
    font-weight: 900;
    /* 白边双层勾边，确保文字在白云中清清楚楚 */
    text-shadow: 2px 0 0 #fff, -2px 0 0 #fff, 0 2px 0 #fff, 0 -2px 0 #fff;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  @keyframes floatBubble {
    0% {
      transform: translateY(var(--start-y, 110vh)) translateX(0) scale(0.9);
      opacity: 0;
    }
    5% {
      opacity: 1;
    }
    90% {
      opacity: 1;
    }
    100% {
      transform: translateY(-20vh) translateX(var(--drift)) scale(1.05);
      opacity: 0;
    }
  }

  /* 悬停微动效 */
  .cloud-bubble:hover {
    transform: scale(1.18) !important;
    z-index: 20;
    transition: transform 0.15s;
  }
  
  /* ================= 手机端精准适配 ================= */
  @media screen and (max-width: 768px) {
    .top-section { padding: 0 20px; }
    .animal-box { font-size: 85px; }
    
    @keyframes pigCenterKiss {
      0% { transform: translateX(0) scale(1); }
      100% { transform: translateX(calc(50vw - 110px)) scale(1.2) rotate(15deg); }
    }
    @keyframes dogCenterKiss {
      0% { transform: translateX(0) scale(1); }
      100% { transform: translateX(calc(-50vw + 110px)) scale(1.2) rotate(-15deg); }
    }

    @keyframes pigKiss {
      0% { transform: scale(1) translateX(0); }
      30% { transform: scale(1.1) translateX(-15px); }
      65% { transform: scale(1.2) translateX(150px) translateY(-10px); }
      100% { transform: scale(1) translateX(0); }
    }
    @keyframes dogKissBack {
      0% { transform: scale(1) translateX(0); }
      30% { transform: scale(1.1) translateX(15px); }
      65% { transform: scale(1.2) translateX(-150px) translateY(-10px); }
      100% { transform: scale(1) translateX(0); }
    }

    .circle-text-wrap { width: 220px; height: 220px; }
    .center-emoji { font-size: 75px; }
    .rotate-text { font-size: 44px; }
    .text-1 { transform: translate(-50%, -120px); }
    .text-2 { transform: translate(70px, -80px); }
    .text-3 { transform: translate(70px, 20px); }
    .text-4 { transform: translate(-50%, 65px); }
    .text-5 { transform: translate(-130px, 20px); }
    .text-6 { transform: translate(-130px, -80px); }
    
    .hometown-text { font-size: 26px; }
    .fan-text { font-size: 18px; }
    .fan-code { font-size: 16px; }
    .question { font-size: 30px; }
    .btn { padding: 12px 30px; font-size: 22px; }
    .thank-you { font-size: 54px; }

    .cloud-bubble { width: 120px; height: 120px; }
    .cloud-bg { font-size: 130px; }
    .bubble-content { width: 95px; top: 44%; }
    .bubble-title { font-size: 11px; }
    .bubble-time { font-size: 9px; }
  }
  
  @media screen and (max-width: 480px) {
    .animal-box { font-size: 70px; }
    @keyframes pigCenterKiss {
      0% { transform: translateX(0) scale(1); }
      100% { transform: translateX(calc(50vw - 85px)) scale(1.1) rotate(15deg); }
    }
    @keyframes dogCenterKiss {
      0% { transform: translateX(0) scale(1); }
      100% { transform: translateX(calc(-50vw + 85px)) scale(1.1) rotate(-15deg); }
    }
    .circle-text-wrap { width: 170px; height: 170px; }
    .center-emoji { font-size: 60px; }
    .rotate-text { font-size: 36px; }
    .text-1 { transform: translate(-50%, -95px); }
    .text-2 { transform: translate(55px, -65px); }
    .text-3 { transform: translate(55px, 15px); }
    .text-4 { transform: translate(-50%, 50px); }
    .text-5 { transform: translate(-105px, 15px); }
    .text-6 { transform: translate(-105px, -65px); }
    .hometown-text { font-size: 22px; }
    .fan-text { font-size: 16px; }
    .fan-code { font-size: 14px; }
    .question { font-size: 24px; }
    .btn { padding: 10px 24px; font-size: 18px; }
  }
</style>
</head>
<body>

  <!-- 上部区域 -->
  <div class="top-section">
    <div class="content-box">
      <!-- 极地小猪 -->
      <div class="animal-box" id="pigActor" onclick="pigKissDog()">🐷</div>
      
      <!-- 中间旋转文字 -->
      <div class="circle-text-wrap">
        <div class="center-emoji">★</div>
        <div class="rotate-ring">
          <div class="rotate-text text-1">我</div>
          <div class="rotate-text text-2">是</div>
          <div class="rotate-text text-3">星</div>
          <div class="rotate-text text-4">星</div>
          <div class="rotate-text text-5">妹</div>
          <div class="rotate-text text-6">呀</div>
        </div>
      </div>
      
      <!-- 垂耳小狗 -->
      <div class="animal-box" id="dogTarget" onclick="dogKissPig()">🐶</div>
    </div>
  </div>
  
  <!-- 中部区域 -->
  <div class="middle-section">
    <div class="danmaku-container danmaku-top">
      <div class="danmaku-track">
        <span>极禹99 🧡💚 </span><span>极禹99 💚🧡 </span><span>极禹99 🧡💚 </span><span>极禹99 💚🧡 </span>
        <span>极禹99 🧡💚 </span><span>极禹99 💚🧡 </span><span>极禹99 🧡💚 </span><span>极禹99 💚🧡 </span>
      </div>
    </div>

    <div class="hometown-text">陪你把异乡走成故乡</div>
    <div class="fan-text">情侣飞车，我和张极玩过。</div>
    <div class="fan-code">这感情不值得我犹豫！</div>

    <div class="danmaku-container danmaku-bottom">
      <div class="danmaku-track reverse">
        <span>极禹99 💚🧡 </span><span>极禹99 🧡💚 </span><span>极禹99 🧡💚 </span><span>极禹99 💚🧡 </span>
        <span>极禹99 💚🧡 </span><span>极禹99 💚🧡 </span><span>极禹99 🧡💚 </span><span>极禹99 💚🧡 </span>
      </div>
    </div>
  </div>
  
  <!-- 底部区域 -->
  <div class="bottom-section">
    <div class="question">你喜欢极禹嘛</div>
    <div class="btn-group">
      <button class="btn" onclick="likeYes()">喜欢</button>
      <button class="btn" onclick="likeNo()">不喜欢</button>
    </div>
  </div>
  
  <!-- 喜欢弹窗 -->
  <div class="thank-you" id="thankYou">谢谢你！💖</div>

<script>
  // ================= 1. 双人舞台数据 =================
  const stages = [
    { time: "2018试训时期", title: "《泡沫》" },
    { time: "2018.8.29", title: "《改变自己》" },
    { time: "2020.7.3", title: "《Because of you》" },
    { time: "2020.11.6", title: "《只对你有感觉》" },
    { time: "2022.2.3", title: "《R&B all right》" },
    { time: "2022.10.24", title: "《决爱》" },
    { time: "2023.1.26", title: "《流浪记》" },
    { time: "2023.4.16", title: "《Rolling In The Deep》" },
    { time: "2023.8.13", title: "《连名带姓》" },
    { time: "2024.2.3/4", title: "《勇敢》" },
    { time: "2024.2.3/4", title: "《Bite me》" },
    { time: "2024.8.10", title: "《笼》" },
    { time: "2024.8.25", title: "《Paris In The Rain》" },
    { time: "2024.8.25", title: "《Senorita》" },
    { time: "2025.5.2", title: "《不值得》" },
    { time: "2025.8.30", title: "《过》" },
    { time: "2026.2.1", title: "《暗香》" }
  ];

  let stageIndex = 0;

  // 发射单朵云，通过 isInitial 参数判断是否需要一开始就显示在半空中
  function launchSingleCloud(isInitial = false) {
    const stage = stages[stageIndex];
    stageIndex = (stageIndex + 1) % stages.length;

    const bubble = document.createElement('div');
    bubble.className = 'cloud-bubble';
    
    const leftPercent = 5 + Math.random() * 70; 
    const driftPx = (Math.random() - 0.5) * 140;
    const duration = 9 + Math.random() * 5; // 速度调快到 9s-14s 飘完

    bubble.style.left = leftPercent + '%';
    bubble.style.setProperty('--drift', driftPx + 'px');
    bubble.style.setProperty('--duration', duration + 's');

    // 核心更改：如果是一开始初始化的云朵，让它直接随机分配在页面不同的高度上(15vh 到 85vh 之间)
    if (isInitial) {
      const startY = 15 + Math.random() * 70;
      bubble.style.setProperty('--start-y', startY + 'vh');
    } else {
      bubble.style.setProperty('--start-y', '110vh');
    }

    // 结构升级：利用绝对定位，强行把文字框锁死在 ☁️ 的核心中央
    bubble.innerHTML = `
      <div class="cloud-bg">☁️</div>
      <div class="bubble-content">
        <span class="bubble-time">${stage.time}</span>
        <span class="bubble-title">${stage.title}</span>
      </div>
    `;

    bubble.onclick = function(e) {
      e.stopPropagation();
      triggerIndividualBurst(e.clientX, e.clientY);
      bubble.remove();
    };

    bubble.addEventListener('animationend', () => {
      bubble.remove();
    });

    document.body.appendChild(bubble);
  }

  // 极速云朵发射控制器
  function startCloudSpawner() {
    // 1. 初始化满屏：一打开网页，直接瞬发 5 个散落半空的气泡
    for(let i = 0; i < 5; i++) {
      launchSingleCloud(true);
    }
    
    // 2. 随后高速连发：每隔 0.8 秒就从底部喷涌出一个新的云朵气泡
    setInterval(() => {
      launchSingleCloud(false);
    }, 800);
  }

  function triggerIndividualBurst(x, y) {
    const emojis = ['✨', '💎', '🌸', '🧡', '💚'];
    for(let i=0; i<6; i++) {
      createSingleParticle(x, y, emojis[Math.floor(Math.random()*emojis.length)]);
    }
  }

  // ================= 2. 核心互动逻辑处理 =================
  function clearAnimations() {
    const pig = document.getElementById("pigActor");
    const dog = document.getElementById("dogTarget");
    pig.classList.remove("kiss-action", "shy-action", "pig-to-center");
    dog.classList.remove("kiss-back-action", "shy-action", "dog-to-center");
    void pig.offsetWidth;
    void dog.offsetWidth;
  }

  function pigKissDog() {
    const pig = document.getElementById("pigActor");
    const dog = document.getElementById("dogTarget");
    clearAnimations();
    pig.classList.add("kiss-action");
    setTimeout(() => {
      dog.classList.add("shy-action");
      createHeartBurst(dog);
    }, 320);
  }

  function dogKissPig() {
    const pig = document.getElementById("pigActor");
    const dog = document.getElementById("dogTarget");
    clearAnimations();
    dog.classList.add("kiss-back-action");
    setTimeout(() => {
      pig.classList.add("shy-action");
      createHeartBurst(pig);
    }, 320);
  }

  // 双向奔赴：小猪和小狗前往中间合体并疯狂爆发出爱心与钻石
  function doubleLoveInCenter() {
    const pig = document.getElementById("pigActor");
    const dog = document.getElementById("dogTarget");
    clearAnimations();
    
    pig.classList.add("pig-to-center");
    dog.classList.add("dog-to-center");

    // 中路爆发特效（满屏钻石、爱心、樱花）
    let burstTimer = setInterval(() => {
      const pRect = pig.getBoundingClientRect();
      const dRect = dog.getBoundingClientRect();
      const middleX = (pRect.left + dRect.right) / 2;
      const middleY = (pRect.top + pRect.bottom) / 2;
      
      const emojis = ['❤️', '💖', '💝', '✨', '💎', '🧡', '💚', '🌸'];
      for(let i=0; i<8; i++) {
        createSingleParticle(middleX, middleY, emojis[Math.floor(Math.random() * emojis.length)]);
      }
    }, 100);

    setTimeout(() => {
      clearInterval(burstTimer);
      pig.classList.remove("pig-to-center");
      dog.classList.remove("dog-to-center");
    }, 1500);
  }

  function createSingleParticle(centerX, centerY, text) {
    const heart = document.createElement('div');
    heart.className = 'burst-heart';
    heart.innerText = text;
    heart.style.left = centerX + 'px';
    heart.style.top = centerY + 'px';
    
    const angle = Math.random() * Math.PI * 2;
    const distance = 50 + Math.random() * 240;
    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;
    
    heart.style.setProperty('--x', `${x}px`);
    heart.style.setProperty('--y', `${y}px`);
    
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 800);
  }

  function createHeartBurst(targetElement) {
    const rect = targetElement.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const emojis = ['❤️', '💖', '💝', '✨', '🧡', '💚', '🌸', '💎'];

    for (let i = 0; i < 15; i++) {
      createSingleParticle(centerX, centerY, emojis[Math.floor(Math.random() * emojis.length)]);
    }
  }

  function likeNo() {
    alert("不喜欢极你遭了噻～");
    setTimeout(() => {
      doubleLoveInCenter();
    }, 300);
  }
  
  function likeYes() {
    const el = document.getElementById("thankYou");
    el.classList.add("show");
    doubleLoveInCenter();
    setTimeout(() => {
      el.classList.remove("show");
    }, 3000);
  }

  // 初始化执行
  window.addEventListener('DOMContentLoaded', () => {
    startCloudSpawner();
  });
</script>
</body>
</html>
